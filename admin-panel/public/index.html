<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iVA Master Portal | Enterprise Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --brand: #6366f1;
            --brand-dark: #4f46e5;
            --bg: #020617;
            --surface: #0f172a;
            --border: rgba(255, 255, 255, 0.06);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: #f8fafc;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
        }

        .sidebar-item {
            transition: all 0.2s;
            cursor: pointer;
        }

        .sidebar-item.active {
            background: rgba(99, 102, 241, 0.1);
            color: var(--brand);
            border-right: 3px solid var(--brand);
        }

        .btn-grad {
            background: linear-gradient(135deg, var(--brand), var(--brand-dark));
            transition: all 0.2s;
        }

        .btn-grad:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
        }

        .toggle-switch {
            width: 44px; height: 24px; border-radius: 12px;
            position: relative; cursor: pointer; transition: background 0.3s;
            border: none; padding: 0;
        }
        .toggle-switch.on { background: #10b981; }
        .toggle-switch.off { background: #ef4444; }
        .toggle-knob {
            width: 18px; height: 18px; border-radius: 50%;
            background: white; position: absolute; top: 3px;
            transition: left 0.3s; box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }
        .toggle-switch.on .toggle-knob { left: 23px; }
        .toggle-switch.off .toggle-knob { left: 3px; }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-page { animation: slideIn 0.4s ease-out; }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = "https://baawqrqihlhsrghvjlpx.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhYXdxcnFpaGxoc3JnaHZqbHB4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3Nzk2NzgsImV4cCI6MjA5MTM1NTY3OH0.h1mfhgS8G3IYcZ96L8T3YXkmxtbYJv95rJM39z1Clw0";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [authState, setAuthState] = useState({ token: localStorage.getItem('iva_admin_token'), email: localStorage.getItem('iva_admin_email') });
            const [view, setView] = useState(authState.token ? 'dash' : 'login');

            const handleLogin = (token, email) => {
                localStorage.setItem('iva_admin_token', token);
                localStorage.setItem('iva_admin_email', email);
                setAuthState({ token, email });
                setView('dash');
            };

            const handleLogout = () => {
                localStorage.clear();
                setAuthState({ token: null, email: null });
                setView('login');
            };

            return view === 'login' ? <Login onLogin={handleLogin} /> : <Dashboard auth={authState} onLogout={handleLogout} />;
        }

        function Login({ onLogin }) {
            const [email, setEmail] = useState('admin@iva.com');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true); setError('');
                try {
                    const { data: admin, error: supaErr } = await supabase
                        .from('admins')
                        .select('*')
                        .eq('email', email)
                        .single();

                    if (supaErr || !admin || password !== admin.password_hash) {
                        setError('Invalid administrative credentials');
                    } else {
                        onLogin('cloud-token', admin.email);
                    }
                } catch (err) { setError('Network Error. Confirm Cloud status.'); }
                setLoading(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className="glass-card p-10 rounded-[40px] w-full max-w-md border border-indigo-500/20">
                        <div className="text-center mb-10">
                            <div className="w-16 h-16 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-3xl mx-auto flex items-center justify-center text-2xl font-black mb-6 shadow-xl shadow-indigo-500/20 text-white">iA</div>
                            <h1 className="text-3xl font-bold text-white mb-2 tracking-tight">iVA Master Portal</h1>
                            <p className="text-slate-400 font-medium">Control Plane Access</p>
                        </div>
                        {error && <div className="bg-red-500/10 text-red-400 p-4 rounded-2xl mb-6 text-sm text-center border border-red-500/20">{error}</div>}
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 block ml-1">Admin Email</label>
                                <input type="email" className="w-full bg-[#0f172a] border border-white/10 rounded-2xl px-5 py-4 text-white outline-none" value={email} onChange={e => setEmail(e.target.value)} required />
                            </div>
                            <div>
                                <label className="text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 block ml-1">Access Password</label>
                                <input type="password" placeholder="••••••••" className="w-full bg-[#0f172a] border border-white/10 rounded-2xl px-5 py-4 text-white outline-none" value={password} onChange={e => setPassword(e.target.value)} required />
                            </div>
                            <button type="submit" disabled={loading} className="w-full h-14 rounded-2xl btn-grad text-white font-bold text-lg mt-4 disabled:opacity-50">
                                {loading ? 'Authorizing...' : 'Enter Console'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        function Dashboard({ auth, onLogout }) {
            const [shops, setShops] = useState([]);
            const [tab, setTab] = useState('overview');
            const [loading, setLoading] = useState(true);
            const [editingValidity, setEditingValidity] = useState({}); // { shopId: days }
            const [savingValidity, setSavingValidity] = useState({});

            const loadShops = async () => {
                setLoading(true);
                try {
                    const { data, error } = await supabase
                        .from('shops')
                        .select('*, shop_stats(updated_at, stats_json)')
                        .order('created_at', { ascending: false });
                    if (data) setShops(data);
                } catch (e) { }
                setLoading(false);
            };

            useEffect(() => { loadShops(); }, []);

            // Subscribe to realtime changes for live updates
            useEffect(() => {
                const channel = supabase
                    .channel('admin-shop-updates')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'shops' }, () => {
                        loadShops();
                    })
                    .subscribe();
                return () => { supabase.removeChannel(channel); };
            }, []);

            const toggleSoftware = async (id, current) => {
                try {
                    // ONLY toggle is_active — is_paid is handled separately via Subscription tab
                    await supabase.from('shops').update({ 
                        is_active: !current,
                        ever_activated: true,
                        validity_start: !current ? new Date().toISOString() : undefined,
                        validity_end: !current ? new Date(Date.now() + 30 * 86400000).toISOString() : undefined
                    }).eq('id', id);
                    loadShops();
                } catch (e) { }
            };

            const togglePaid = async (id, current) => {
                try {
                    const update = { is_paid: !current };
                    // When marking as PAID, refresh validity to 30 days from now
                    if (!current) {
                        update.validity_start = new Date().toISOString();
                        update.validity_end = new Date(Date.now() + 30 * 86400000).toISOString();
                    }
                    // When marking as UNPAID, DON'T touch validity_end — let days keep counting down
                    await supabase.from('shops').update(update).eq('id', id);
                    loadShops();
                } catch (e) { }
            };

            // Save edited validity days — recalculates expiry date
            const saveValidityDays = async (id) => {
                const days = parseInt(editingValidity[id]);
                if (isNaN(days) || days < 0) return;
                setSavingValidity(prev => ({ ...prev, [id]: true }));
                try {
                    const now = new Date();
                    const newEnd = new Date(now.getTime() + days * 86400000);
                    await supabase.from('shops').update({
                        validity_start: now.toISOString(),
                        validity_end: newEnd.toISOString()
                    }).eq('id', id);
                    setEditingValidity(prev => { const n = {...prev}; delete n[id]; return n; });
                    loadShops();
                } catch (e) { }
                setSavingValidity(prev => ({ ...prev, [id]: false }));
            };

            const deleteShop = async (id) => {
                if (!confirm("🚨 PERMANENT DELETE: All cloud data for this shop will be erased. Continue?")) return;
                try {
                    // Delete related records first
                    await supabase.from('shop_stats').delete().eq('shop_id', id);
                    await supabase.from('pairing_codes').delete().eq('shop_id', id);
                    await supabase.from('shops').delete().eq('id', id);
                    loadShops();
                } catch (e) { }
            };

            const stats = {
                total: shops.length,
                paid: shops.filter(s => s.is_paid).length,
                active: shops.filter(s => s.is_active).length,
                expired: shops.filter(s => {
                    if (!s.validity_end) return false;
                    return new Date(s.validity_end) < new Date();
                }).length
            };

            const formatDate = (d) => d ? new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : 'N/A';
            const getDaysLeft = (end) => {
                if (!end) return 0;
                const diff = Math.ceil((new Date(end) - new Date()) / 86400000);
                return Math.max(0, diff);
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-72 glass-card flex flex-col p-8 border-r border-white/5">
                        <div className="flex items-center gap-4 mb-12">
                            <div className="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center font-black text-white">I</div>
                            <span className="text-xl font-bold tracking-tighter text-white">INNOAIVATORS</span>
                        </div>
                        <nav className="flex-1 space-y-2">
                            {[
                                { id: 'overview', label: 'Overview', icon: 'M4 6h16M4 12h16M4 18h7' },
                                { id: 'live', label: 'Live Tracking', icon: 'M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z' },
                                { id: 'shops', label: 'Software Status', icon: 'M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16' },
                                { id: 'validity', label: 'Subscription', icon: 'M12 8v4l3 3m6-3a9 9 0 11-18 0' },
                                { id: 'owners', label: 'Owner Records', icon: 'M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2' }
                            ].map(item => (
                                <div key={item.id} onClick={() => setTab(item.id)} className={`sidebar-item flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-sm ${tab === item.id ? 'active' : 'text-slate-500 hover:text-slate-300'}`}>
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d={item.icon} /></svg>
                                    {item.label}
                                </div>
                            ))}
                        </nav>
                        <div className="pt-8 border-t border-white/5">
                            <div className="mb-6 flex items-center gap-3">
                                <div className="w-8 h-8 rounded-full bg-indigo-500/20 flex items-center justify-center text-[10px] font-black">{auth.email[0].toUpperCase()}</div>
                                <span className="text-xs font-bold text-slate-400 truncate">{auth.email}</span>
                            </div>
                            <button onClick={onLogout} className="w-full py-3 bg-red-500/10 text-red-500 rounded-xl text-xs font-bold border border-red-500/20 hover:bg-red-500/20">Log Out</button>
                        </div>
                    </aside>

                    {/* Main */}
                    <main className="flex-1 overflow-y-auto p-12 bg-[#020617] relative">
                        {loading && <div className="absolute inset-0 bg-black/20 backdrop-blur-sm z-50 flex items-center justify-center text-indigo-400 font-bold">Synchronizing...</div>}

                        {/* Top Stats */}
                        <div className="grid grid-cols-4 gap-6 mb-12 animate-page">
                            {[
                                { label: 'Total Reach', val: stats.total, color: 'text-white' },
                                { label: 'Paid & Active', val: stats.paid, color: 'text-emerald-400' },
                                { label: 'Unpaid / Expired', val: stats.expired, color: 'text-red-400' },
                                { label: 'Revenue (Est.)', val: '₹' + (stats.paid * 1500).toLocaleString(), color: 'text-indigo-400' }
                            ].map(s => (
                                <div key={s.label} className="glass-card p-6 rounded-[28px]">
                                    <p className="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1">{s.label}</p>
                                    <p className={`text-2xl font-black ${s.color}`}>{s.val}</p>
                                </div>
                            ))}
                        </div>

                        {/* ═══ SHOPS TAB ═══ */}
                        {tab === 'shops' && (
                            <div className="animate-page">
                                <div className="mb-8 flex items-center justify-between">
                                    <div>
                                        <h2 className="text-3xl font-black text-white">Software Ecosystem</h2>
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Global Installation & Activation Control</p>
                                    </div>
                                    {/* Pending badge count */}
                                    {shops.filter(s => s.activation_requested && !s.ever_activated).length > 0 && (
                                        <div className="flex items-center gap-2 px-5 py-2 bg-yellow-500/10 border border-yellow-500/30 rounded-xl">
                                            <span className="w-2 h-2 rounded-full bg-yellow-400 animate-pulse"></span>
                                            <span className="text-yellow-400 font-black text-sm">
                                                {shops.filter(s => s.activation_requested && !s.ever_activated).length} Pending Activation
                                            </span>
                                        </div>
                                    )}
                                </div>
                                <div className="glass-card rounded-[32px] overflow-hidden">
                                    <table className="w-full text-left">
                                        <thead className="bg-white/[0.02] text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-white/5">
                                            <tr>
                                                <th className="px-8 py-5">Shop / System ID</th>
                                                <th className="px-8 py-5">Owner</th>
                                                <th className="px-6 py-5 text-center">Status</th>
                                                <th className="px-6 py-5 text-center">Validity</th>
                                                <th className="px-8 py-5 text-center">Software Status</th>
                                                <th className="px-8 py-5 text-right">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-white/[0.03]">
                                            {/* Sort: pending first, then rest */}
                                            {[...shops].sort((a, b) => {
                                                const aP = a.activation_requested && !a.ever_activated;
                                                const bP = b.activation_requested && !b.ever_activated;
                                                return bP - aP;
                                            }).map(s => {
                                                const shopName = s.name || 'Unknown Shop';
                                                const isPending = s.activation_requested && !s.ever_activated;
                                                return (
                                                    <tr key={s.id} className={`hover:bg-white/[0.01] ${isPending ? 'bg-yellow-500/[0.03]' : ''}`}>
                                                        <td className="px-8 py-6">
                                                            <div className="flex items-center gap-3">
                                                                {isPending && <span className="px-2 py-0.5 bg-yellow-500/20 text-yellow-400 text-[8px] font-black uppercase tracking-wider rounded-full border border-yellow-500/30">NEW</span>}
                                                            </div>
                                                            <div className="font-mono text-[10px] text-slate-500 mt-1">{s.id}</div>
                                                            {s.hardware_id && <div className="font-mono text-[9px] text-purple-400/60 mt-0.5 max-w-[200px] truncate" title={s.hardware_id}>HW: {s.hardware_id}</div>}
                                                        </td>
                                                        <td className="px-8 py-6">
                                                            <div className="font-bold text-sm text-white">{shopName}</div>
                                                            <div className="text-[10px] text-slate-500">{s.owner_email}</div>
                                                            <div className="text-[10px] text-slate-600">{s.mobile_number || ''}</div>
                                                        </td>
                                                        <td className="px-6 py-6 text-center">
                                                            {(() => {
                                                                const lastPingTime = s.last_ping_at || s.updated_at;
                                                                if (!lastPingTime) return <span className="text-[10px] text-slate-500 font-bold">Never</span>;
                                                                const diffMins = (new Date() - new Date(lastPingTime)) / 60000;
                                                                const isOnline = diffMins < 15 && s.is_active;
                                                                if (isOnline) return <div className="flex items-center justify-center gap-2"><span className="w-2 h-2 rounded-full bg-green-400 shadow-[0_0_8px_#4ade80]"></span><span className="text-[10px] text-green-400 font-bold">Online</span></div>;
                                                                return <span className="text-[10px] text-slate-500 font-bold">Offline</span>;
                                                            })()}
                                                        </td>
                                                        <td className="px-6 py-6 text-center">
                                                            {isPending ? (
                                                                <span className="px-3 py-1 rounded-full text-[10px] font-black bg-yellow-500/10 text-yellow-400">Pending</span>
                                                            ) : (
                                                                <span className={`px-3 py-1 rounded-full text-[10px] font-black ${getDaysLeft(s.validity_end) > 7 ? 'bg-emerald-500/10 text-emerald-400' : 'bg-red-500/10 text-red-500'}`}>
                                                                    {getDaysLeft(s.validity_end)} Days
                                                                </span>
                                                            )}
                                                        </td>
                                                        <td className="px-8 py-6 text-center">
                                                            <div className="flex flex-col items-center gap-2">
                                                                <button onClick={() => toggleSoftware(s.id, s.is_active)} className={`flex items-center gap-2 px-5 py-2 mx-auto rounded-full text-[10px] font-black border transition-all ${s.is_active ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : isPending ? 'bg-yellow-500/10 text-yellow-400 border-yellow-500/30 hover:scale-105 active:scale-95 animate-pulse' : 'bg-red-500/10 text-red-500 border-red-500/20 hover:scale-105 active:scale-95'}`}>
                                                                    <span className={`w-1.5 h-1.5 rounded-full ${s.is_active ? 'bg-emerald-400' : isPending ? 'bg-yellow-400 animate-pulse' : 'bg-red-500'}`}></span>
                                                                    {s.is_active ? 'ACTIVATED' : isPending ? '⚡ ACTIVATE NOW' : 'DEACTIVATED'}
                                                                </button>
                                                                {isPending && <span className="text-[8px] text-yellow-500 font-bold uppercase tracking-widest">Awaiting Admin Approval</span>}
                                                                {!s.is_paid && !s.is_active && !isPending && <span className="text-[8px] text-orange-400 font-bold uppercase tracking-widest">Payment Pending</span>}
                                                            </div>
                                                        </td>
                                                        <td className="px-8 py-6 text-right">
                                                            <button onClick={() => deleteShop(s.id)} className="w-9 h-9 bg-red-500/10 text-red-500 rounded-xl flex items-center justify-center ml-auto hover:bg-red-500 hover:text-white transition">
                                                                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* ═══ VALIDITY TAB ═══ */}
                        {tab === 'validity' && (
                            <div className="animate-page">
                                <div className="mb-8">
                                    <h2 className="text-3xl font-black text-white">Subscription Management</h2>
                                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Validity Control & Payment Tracking</p>
                                </div>
                                <div className="glass-card rounded-[32px] overflow-hidden">
                                    <table className="w-full text-left">
                                        <thead className="bg-white/[0.02] text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-white/5">
                                            <tr>
                                                <th className="px-6 py-5">Shop</th>
                                                <th className="px-6 py-5 text-center">Start Date</th>
                                                <th className="px-6 py-5 text-center">Expiry Date</th>
                                                <th className="px-6 py-5 text-center">Validity Days</th>
                                                <th className="px-6 py-5 text-center">Payment Status</th>
                                                <th className="px-6 py-5 text-center">Toggle Paid</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-white/[0.03]">
                                            {shops.map(s => {
                                                const currentDays = getDaysLeft(s.validity_end);
                                                const isEditing = editingValidity.hasOwnProperty(s.id);
                                                const isSaving = savingValidity[s.id];
                                                return (
                                                <tr key={s.id} className="hover:bg-white/[0.01]">
                                                    <td className="px-6 py-5">
                                                        <p className="font-bold text-white text-sm">{s.name || 'Unknown Shop'}</p>
                                                        <p className="text-[10px] text-slate-500 font-mono uppercase">{s.id}</p>
                                                    </td>
                                                    <td className="px-6 py-5 text-center text-xs text-slate-400 font-medium">{formatDate(s.validity_start)}</td>
                                                    <td className="px-6 py-5 text-center text-xs text-slate-300 font-bold">{formatDate(s.validity_end)}</td>
                                                    <td className="px-6 py-5 text-center">
                                                        <div className="flex items-center justify-center gap-2">
                                                            {isEditing ? (
                                                                <>
                                                                    <input
                                                                        type="number"
                                                                        min="0"
                                                                        value={editingValidity[s.id]}
                                                                        onChange={e => setEditingValidity(prev => ({ ...prev, [s.id]: e.target.value }))}
                                                                        onKeyDown={e => e.key === 'Enter' && saveValidityDays(s.id)}
                                                                        className="w-16 h-8 text-center bg-[#0f172a] border border-indigo-500/50 rounded-lg text-white text-xs font-bold outline-none focus:border-indigo-400"
                                                                        autoFocus
                                                                    />
                                                                    <button
                                                                        onClick={() => saveValidityDays(s.id)}
                                                                        disabled={isSaving}
                                                                        className="px-3 py-1.5 rounded-lg text-[10px] font-black bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 hover:bg-indigo-500 hover:text-white transition disabled:opacity-50"
                                                                    >
                                                                        {isSaving ? '...' : '💾 Save'}
                                                                    </button>
                                                                    <button
                                                                        onClick={() => setEditingValidity(prev => { const n = {...prev}; delete n[s.id]; return n; })}
                                                                        className="px-2 py-1.5 rounded-lg text-[10px] font-black bg-red-500/10 text-red-400 border border-red-500/20 hover:bg-red-500/20 transition"
                                                                    >
                                                                        ✕
                                                                    </button>
                                                                </>
                                                            ) : (
                                                                <>
                                                                    <span
                                                                        className={`px-4 py-1.5 rounded-full text-xs font-black cursor-pointer hover:ring-2 hover:ring-indigo-500/30 transition ${currentDays > 7 ? 'bg-emerald-500/10 text-emerald-400' : 'bg-red-500/10 text-red-500'}`}
                                                                        onClick={() => setEditingValidity(prev => ({ ...prev, [s.id]: String(currentDays) }))}
                                                                        title="Click to edit validity days"
                                                                    >
                                                                        {currentDays} Days
                                                                    </span>
                                                                    <button
                                                                        onClick={() => setEditingValidity(prev => ({ ...prev, [s.id]: String(currentDays) }))}
                                                                        className="w-6 h-6 flex items-center justify-center rounded-lg bg-white/[0.03] hover:bg-indigo-500/20 text-slate-500 hover:text-indigo-400 transition"
                                                                        title="Edit validity days"
                                                                    >
                                                                        <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                                                                    </button>
                                                                </>
                                                            )}
                                                        </div>
                                                    </td>
                                                    <td className="px-6 py-5 text-center">
                                                        <span className={`px-3 py-1 rounded-full text-[10px] font-black border ${s.is_paid ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-red-500/10 text-red-500 border-red-500/20'}`}>
                                                            {s.is_paid ? '🟢 PAID' : '🔴 UNPAID'}
                                                        </span>
                                                    </td>
                                                    <td className="px-6 py-5">
                                                        <button onClick={() => togglePaid(s.id, s.is_paid)} className={`toggle-switch mx-auto ${s.is_paid ? 'on' : 'off'}`}>
                                                            <div className="toggle-knob"></div>
                                                        </button>
                                                    </td>
                                                </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* ═══ OWNERS TAB ═══ */}
                        {tab === 'owners' && (
                            <div className="animate-page">
                                <div className="mb-8">
                                    <h2 className="text-3xl font-black text-white">Owner Directory</h2>
                                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">System Master Records</p>
                                </div>
                                <div className="grid grid-cols-3 gap-6">
                                    {shops.map(s => (
                                        <div key={s.id} className="glass-card p-6 rounded-[32px] border-l-4 border-indigo-500/30">
                                            <p className="text-[9px] font-black text-indigo-400 uppercase tracking-widest mb-4">Master Account</p>
                                            <h3 className="text-xl font-black text-white mb-1">{s.owner_name || 'N/A'}</h3>
                                            <p className="text-slate-400 text-sm font-medium mb-6">{s.owner_email || 'N/A'}</p>
                                            <div className="space-y-3">
                                                <div className="flex items-center gap-3 text-xs text-slate-500">
                                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" strokeWidth="2" /></svg>
                                                    {s.mobile_number || 'N/A'}
                                                </div>
                                                <div className="flex items-center gap-3 text-xs text-slate-500">
                                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5" strokeWidth="2" /></svg>
                                                    Works at: <span className="text-indigo-400 font-bold">{s.name || 'N/A'}</span>
                                                </div>
                                                <div className="flex items-center gap-3 text-xs text-slate-500">
                                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" strokeWidth="2" /></svg>
                                                    Validity: <span className={`font-bold ${getDaysLeft(s.validity_end) > 7 ? 'text-emerald-400' : 'text-red-400'}`}>{getDaysLeft(s.validity_end)} days left</span>
                                                </div>
                                                <div className="flex items-center gap-3 text-xs text-slate-500">
                                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" strokeWidth="2" /></svg>
                                                    Status: <span className={`font-bold ${s.is_active ? 'text-emerald-400' : 'text-red-400'}`}>{s.is_active ? 'Active' : 'Inactive'}</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        
                        {/* ═══ OVERVIEW TAB ═══ */}
                        {tab === 'overview' && (
                            <div className="animate-page">
                                <div className="mb-8">
                                    <h2 className="text-3xl font-black text-white">Business Intelligence</h2>
                                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Global Ecosystem Snapshot</p>
                                </div>
                                <div className="grid grid-cols-2 gap-8">
                                    <div className="glass-card p-8 rounded-[32px]">
                                        <h3 className="text-sm font-bold text-white mb-6 flex items-center gap-2">
                                            <span className="w-2 h-2 rounded-full bg-indigo-500"></span> Recent Installations
                                        </h3>
                                        <div className="space-y-4">
                                            {shops.slice(0, 5).map(s => (
                                                <div key={s.id} className="flex items-center justify-between p-4 bg-white/[0.02] rounded-2xl border border-white/5">
                                                    <div>
                                                        <p className="text-xs font-bold text-white">{s.name || 'Unknown Shop'}</p>
                                                        <p className="text-[9px] text-slate-500 font-mono uppercase">{s.id}</p>
                                                    </div>
                                                    <span className="text-[10px] font-black text-slate-500">{formatDate(s.created_at)}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="glass-card p-8 rounded-[32px] flex flex-col items-center justify-center text-center">
                                         <div className="w-24 h-24 rounded-full bg-indigo-500/10 flex items-center justify-center mb-6">
                                            <svg className="w-12 h-12 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" strokeWidth="2" /></svg>
                                         </div>
                                         <h3 className="text-xl font-black text-white mb-2">System Status: Optimal</h3>
                                         <p className="text-slate-400 text-sm max-w-xs">The SaaS Control Plane is monitoring {stats.total} installations across the network.</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ═══ LIVE TRACKING TAB ═══ */}
                        {tab === 'live' && (
                            <div className="animate-page">
                                <div className="mb-8">
                                    <h2 className="text-3xl font-black text-white flex items-center gap-3">
                                        <span className="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e] animate-pulse"></span>
                                        Live Terminal Tracking
                                    </h2>
                                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Real-Time Shop Connectivity Monitor</p>
                                </div>
                                <div className="grid grid-cols-3 gap-6">
                                    {shops.map(s => {
                                        const now = new Date();
                                        const lastPingTime = s.last_ping_at || s.updated_at;
                                        const lastPing = lastPingTime ? new Date(lastPingTime) : null;
                                        const diffMins = lastPing ? (now - lastPing) / 60000 : Infinity;
                                        const isOnline = diffMins < 15 && s.is_active;
                                        return (
                                            <div key={s.id} className={`glass-card p-6 rounded-[32px] border-l-4 ${isOnline ? 'border-green-500/50' : 'border-slate-700/50'}`}>
                                                <div className="flex justify-between items-start mb-4">
                                                    <div>
                                                        <h3 className="text-xl font-black text-white">{s.name || 'Unknown Shop'}</h3>
                                                        <p className="text-[9px] text-slate-500 font-mono uppercase mt-1">{s.id}</p>
                                                    </div>
                                                    {isOnline ? (
                                                        <div className="flex items-center gap-2 px-3 py-1 bg-green-500/10 rounded-full border border-green-500/20">
                                                            <span className="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse shadow-[0_0_5px_#22c55e]"></span>
                                                            <span className="text-[9px] font-black tracking-wider text-green-400 uppercase">Online</span>
                                                        </div>
                                                    ) : (
                                                        <div className="flex items-center gap-2 px-3 py-1 bg-slate-800 rounded-full border border-slate-700">
                                                            <span className="w-1.5 h-1.5 rounded-full bg-slate-500"></span>
                                                            <span className="text-[9px] font-black tracking-wider text-slate-400 uppercase">Offline</span>
                                                        </div>
                                                    )}
                                                </div>
                                                <div className="space-y-3">
                                                    <div className="flex justify-between items-center bg-white/[0.02] p-3 rounded-2xl">
                                                        <span className="text-[10px] text-slate-400 uppercase font-black">Last Sync</span>
                                                        <span className="text-xs font-bold text-slate-300">
                                                            {lastPing ? lastPing.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' }) : 'Never'}
                                                        </span>
                                                    </div>
                                                    <div className="flex justify-between items-center bg-white/[0.02] p-3 rounded-2xl">
                                                        <span className="text-[10px] text-slate-400 uppercase font-black">Owner</span>
                                                        <span className="text-xs font-bold text-slate-300">{s.owner_name}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                        
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
